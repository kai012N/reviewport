name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - manifest schema / agent protocol
        - overlay / anchoring
        - CLI (proxy / serve)
        - Claude Code integration
        - other agent integration (Cline / Cursor / Aider)
        - docs
        - other
    validations:
      required: true
  - type: markdown
    attributes:
      value: "Heads up: changes to the **manifest schema** or **agent protocol** affect everyone producing/consuming the format, so they need maintainer sign-off before implementation (see GOVERNANCE.md)."
