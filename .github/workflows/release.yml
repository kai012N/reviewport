name: Release

on:
  push:
    branches: [main]

concurrency: release-${{ github.ref }}

permissions:
  contents: write       # create the release PR / git tags
  pull-requests: write  # open the "Version Packages" PR
  id-token: write       # npm trusted publishing (OIDC) — no long-lived NPM_TOKEN

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # npm trusted publishing (OIDC, keyless) requires npm >= 11.5.0; the runner
      # ships an older npm, so upgrade before publishing.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      # Changesets opens/updates a "Version Packages" PR when there are unreleased
      # changesets. The `publish` command runs `changeset publish`, which checks the
      # registry and ONLY publishes versions not already on npm (so it's a clean
      # no-op when there's nothing new — no "cannot publish over" errors). Access is
      # taken from .changeset/config.json ("access": "public"); OIDC needs no token
      # and NPM_CONFIG_PROVENANCE attaches a provenance attestation.
      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          publish: npx --yes @changesets/cli publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
